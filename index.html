<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>
<meta property="og:title" content="For You 🌸" />
<meta property="og:description" content="I have a question for you..." />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://placehold.co/600x400/fce8e8/fce8e8" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fdf6f0 0%, #fce8e8 50%, #f8f0fb 100%);
    font-family: 'Lato', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .petal {
    position: fixed;
    animation: fall linear infinite;
    opacity: 0.6;
    pointer-events: none;
  }

  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    max-width: 420px;
    width: 92%;
    animation: fadeIn 0.6s ease;
  }

  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(10px);
    border-radius: 28px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(200,100,130,0.12), 0 4px 20px rgba(0,0,0,0.06);
    width: 100%;
  }

  .dog-photo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px rgba(200,100,130,0.18);
    animation: wiggle 3s ease-in-out infinite;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-2deg) scale(1); }
    50% { transform: rotate(2deg) scale(1.02); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: #3d2040;
    line-height: 1.35;
    margin-bottom: 32px;
  }

  h1 em {
    font-style: italic;
    color: #c0587a;
  }

  /* Button group — relative container, both buttons normal flow side by side */
  .btn-group {
    position: relative;
    display: flex;
    gap: 14px;
    justify-content: center;
    align-items: center;
    min-height: 56px;
  }

  .btn {
    padding: 14px 30px;
    border: none;
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: 16px;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-yes {
    background: linear-gradient(135deg, #e8638a, #c0587a);
    color: white;
    box-shadow: 0 6px 20px rgba(192,88,122,0.35);
  }

  .btn-yes:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 25px rgba(192,88,122,0.45);
  }

  /* No button: sits in flow normally, but positioned absolute once JS moves it */
  .btn-no {
    background: #f0e8f4;
    color: #9b7aa8;
  }

  .btn-no.escaped {
    position: absolute;
  }

  /* Screen 2 */
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: #9b7aa8;
    margin-bottom: 6px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
    text-align: left;
  }

  label {
    font-size: 12px;
    font-weight: 400;
    color: #9b7aa8;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  input[type="date"],
  select {
    padding: 13px 16px;
    border: 1.5px solid #e8d5f0;
    border-radius: 14px;
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    color: #3d2040;
    background: #fdf8ff;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }

  input[type="date"]:focus,
  select:focus { border-color: #c0587a; }

  .btn-confirm {
    background: linear-gradient(135deg, #e8638a, #c0587a);
    color: white;
    width: 100%;
    padding: 16px;
    border-radius: 50px;
    font-size: 16px;
    box-shadow: 0 6px 20px rgba(192,88,122,0.35);
    margin-top: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.5px;
  }

  .btn-confirm:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(192,88,122,0.4);
  }

  /* Screen 3 */
  .heart-burst {
    font-size: 58px;
    display: block;
    margin-bottom: 18px;
    animation: heartPop 0.7s cubic-bezier(0.36,0.07,0.19,0.97) both;
  }

  @keyframes heartPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .confirmed-text {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: #3d2040;
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .date-display {
    background: linear-gradient(135deg, #fce8f0, #f8f0fb);
    border-radius: 16px;
    padding: 14px 22px;
    margin: 18px 0;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: #c0587a;
    font-style: italic;
  }

  .confirmed-sub {
    font-size: 14px;
    color: #9b7aa8;
    line-height: 1.7;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
  const emojis = ['🌸','🌺','✨','💕','🌼'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (5 + Math.random() * 6) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.fontSize = (14 + Math.random() * 14) + 'px';
    document.body.appendChild(p);
  }
</script>

    <p class="subtitle">So...</p>
    <h1 style="margin-bottom: 22px;">When are<br>you free? 📅</h1>
    <div class="form-group">
      <label>Pick a Day</label>
      <input type="date" id="datePicker">
    </div>
    <div class="form-group">
      <label>What Time?</label>
      <select id="timePicker">
        <option value="">Select a time...</option>
        <option>Morning (10am – 12pm)</option>
        <option>Afternoon (12pm – 3pm)</option>
        <option>Evening (5pm – 7pm)</option>
        <option>Night (7pm – 9pm)</option>
      </select>
    </div>
    <button class="btn-confirm" onclick="confirmDate()">It's a date! ♥</button>
  </div>
</div>

<!-- Screen 3 -->
<div class="screen" id="screen3">
  <div class="card">
    <span class="heart-burst">💕</span>
    <p class="confirmed-text">It's official.</p>
    <div class="date-display" id="dateDisplay"></div>
    <p class="confirmed-sub">I've been looking forward to this for a while.<br>Can't wait to finally see you. 🌸</p>
  </div>
</div>

<script>
  // Set min date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('datePicker').min = today;

  // No button escapes on hover/touch — stays clickable but moves
  let escaped = false;
  function escape() {
    const btn = document.getElementById('noBtn');
    const group = document.getElementById('btnGroup');
    const gRect = group.getBoundingClientRect();
    const bRect = btn.getBoundingClientRect();

    if (!escaped) {
      btn.classList.add('escaped');
      escaped = true;
    }

    const maxX = gRect.width - bRect.width;
    const x = Math.random() * maxX;
    const y = (Math.random() * 80) - 20;

    btn.style.left = Math.max(0, x) + 'px';
    btn.style.top = y + 'px';
  }

  function showScreen2() {
    document.getElementById('screen1').classList.remove('active');
    document.getElementById('screen2').classList.add('active');
  }

  function confirmDate() {
  const date = document.getElementById('datePicker').value;
  const time = document.getElementById('timePicker').value;

  if (!date || !time) {
    alert('Pick a day and time first 🌸');
    return;
  }

  const formatted = new Date(date + 'T12:00:00').toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  document.getElementById('dateDisplay').textContent = formatted + ' · ' + time;
  document.getElementById('screen2').classList.remove('active');
  document.getElementById('screen3').classList.add('active');

  emailjs.init('wYTuPx7whK6KixRUb');
  emailjs.send('service_3kczdmf', 'lb0mab7', {
    date: formatted,
    time: time
  });
}
</script>
